<!doctype html>
<html>
<head>
  <title>{{ title }} | NamVibe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
</head>
<body>
  <main class="empty-profile">
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    {% if profile %}
      <a href="/profile/@{{ profile.username }}">Back to Profile</a>
    {% else %}
      <a href="/">Back Home</a>
    {% endif %}
  </main>
</body>
</html>
