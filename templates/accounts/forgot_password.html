{% extends "base.html" %}
{% block title %}Forgot Password | Eharo{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <span class="auth-badge">Recovery</span>
        <h1>Forgot Password</h1>
        <p>Password reset will be connected to Supabase next.</p>

        <form class="auth-form-grid">
            <div class="form-block full">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-block full">
                <button type="button" class="btn btn-main auth-submit">Send Reset Link</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
