{% extends "base.html" %}

{% block title %}Edit Profile | Namvibe{% endblock %}

{% block content %}
<section style="max-width: 760px; margin: 0 auto; padding: 32px 18px 80px;">
    <h1 style="font-size:34px; margin:0 0 10px;">Edit profile</h1>
    <p style="color:#cbd5e1; margin:0 0 24px;">Shape how people discover you across Namvibe.</p>
    <form method="post" enctype="multipart/form-data" style="display:grid; gap:16px; padding:22px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.07); border-radius:24px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-main" type="submit">Save profile</button>
    </form>
</section>
{% endblock %}
