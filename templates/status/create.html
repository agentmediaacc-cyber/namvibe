{% extends "base.html" %}

{% block title %}Create Story | CHAIN{% endblock %}

{% block extra_css %}
<style>
    .status-container {
        max-width: 500px;
        margin: 40px auto;
        padding: 30px;
        background: var(--chain-bg-panel-strong);
        border: 1px solid var(--chain-border);
        border-radius: 18px;
        box-shadow: var(--chain-shadow-lg);
        backdrop-filter: blur(20px);
    }
    
    .media-placeholder {
        width: 100%;
        aspect-ratio: 9/16;
        background: var(--chain-bg-soft);
        border: 2px dashed var(--chain-border);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        overflow: hidden;
        margin-bottom: 20px;
    }
    
    .media-placeholder img, .media-placeholder video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    .media-placeholder i {
        font-size: 48px;
        color: var(--chain-muted);
        margin-bottom: 10px;
    }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--chain-muted); }
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--chain-border);
        background: var(--chain-bg-soft);
        outline: none;
        resize: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="status-container">
    <h2 style="margin: 0 0 10px;">Create Story</h2>
    <p style="color: var(--chain-muted); font-size: 14px; margin-bottom: 25px;">Share a moment that lasts 24 hours.</p>
    
    <form method="POST" enctype="multipart/form-data" id="status-form">
        <div class="media-placeholder" onclick="document.getElementById('media-input').click()">
            <div id="preview-content">
                <i class="fas fa-camera"></i>
                <p>Tap to upload or take a photo/video</p>
            </div>
            <input type="file" name="media" id="media-input" accept=".jpg,.jpeg,.png,.webp,.gif,.mp4,.webm,.mov,image/*,video/*" hidden onchange="handleMedia(this)">
        </div>
        
        <div class="form-group">
            <label>Caption</label>
            <textarea name="caption" rows="3" placeholder="Add a caption..."></textarea>
        </div>

        <div class="form-group">
            <label>Visibility</label>
            <select name="visibility" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--chain-border);background:var(--chain-bg-soft);">
                <option value="public">Public</option>
                <option value="followers">Followers</option>
                <option value="close_friends">Close Friends</option>
                <option value="private">Private</option>
            </select>
        </div>
        
        <div class="action-cluster">
            <button type="submit" class="primary" style="width: 100%; padding: 15px; border-radius: 12px;">Share Story</button>
            <a href="/" class="secondary" style="width: 100%; padding: 15px; border-radius: 12px; text-align: center; text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>

<script>
    function handleMedia(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            const reader = new FileReader();
            const preview = document.getElementById('preview-content');
            
            reader.onload = function(e) {
                if (file.type.startsWith('image/')) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                } else if (file.type.startsWith('video/')) {
                    preview.innerHTML = `<video src="${e.target.result}" autoplay muted loop></video>`;
                }
            }
            reader.readAsDataURL(file);
        }
    }
</script>
{% endblock %}
