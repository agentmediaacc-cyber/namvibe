{% extends "base.html" %}
{% block content %}
<style>
  html,body{margin:0;background:#000;color:#fff}
  .studio-camera{position:fixed;inset:0;background:#000;overflow:hidden}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  .top{position:absolute;top:0;left:0;right:0;z-index:5;padding:14px;display:flex;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,.55),transparent)}
  .bottom{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:18px 14px 28px;background:linear-gradient(0deg,rgba(0,0,0,.7),transparent);display:flex;flex-direction:column;align-items:center;gap:14px}
  .btn{border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.45);color:#fff;border-radius:999px;padding:11px 15px;font-weight:800;text-decoration:none}
  .btn.green{background:linear-gradient(135deg,#16a85d,#25d366)}
  .capture{width:88px;height:88px;border-radius:999px;border:5px solid #fff;background:#ff3153}
  .capture.recording{border-radius:24px;width:74px;height:74px}
  .hint{font-size:.92rem;background:rgba(0,0,0,.45);padding:9px 13px;border-radius:999px}
  .hidden{display:none}
</style>

<form method="post" enctype="multipart/form-data" id="studioForm">
  {% csrf_token %}
  <div class="studio-camera">
    <video id="live" autoplay muted playsinline></video>
    <video id="playback" class="hidden" controls playsinline></video>

    <div class="top">
      <a class="btn" href="/">Close</a>
      <button type="button" class="btn" id="flipBtn">Flip</button>
    </div>

    <div class="bottom">
      <div class="hint" id="hint">Camera opening… tap record when ready</div>
      <button type="button" class="capture" id="recordBtn"></button>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button type="button" class="btn" id="resetBtn">Retake</button>
        <button type="submit" class="btn green">Post Video</button>
      </div>
    </div>

    <input type="file" name="video" id="videoFile" class="hidden">
  </div>
</form>

<script>
(() => {
  const live = document.getElementById("live");
  const playback = document.getElementById("playback");
  const recordBtn = document.getElementById("recordBtn");
  const resetBtn = document.getElementById("resetBtn");
  const flipBtn = document.getElementById("flipBtn");
  const videoFile = document.getElementById("videoFile");
  const hint = document.getElementById("hint");

  let stream = null;
  let recorder = null;
  let chunks = [];
  let recording = false;
  let front = false;

  async function openCamera(){
    if(stream){ stream.getTracks().forEach(t => t.stop()); }
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode: front ? "user" : "environment", width:{ideal:1280}, height:{ideal:720}},
        audio:true
      });
      live.srcObject = stream;
      live.classList.remove("hidden");
      playback.classList.add("hidden");
      hint.textContent = "Tap red button to start recording";
    }catch(e){
      hint.textContent = "Camera blocked. Allow camera permission and reload.";
      console.error(e);
    }
  }

  function attachVideo(blob){
    const file = new File([blob], `studio_video_${Date.now()}.webm`, {type:"video/webm"});
    const dt = new DataTransfer();
    dt.items.add(file);
    videoFile.files = dt.files;
  }

  recordBtn.addEventListener("click", () => {
    if(!stream) return;

    if(!recording){
      chunks = [];
      recorder = new MediaRecorder(stream, {mimeType:"video/webm"});
      recorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, {type:"video/webm"});
        attachVideo(blob);
        playback.src = URL.createObjectURL(blob);
        playback.classList.remove("hidden");
        live.classList.add("hidden");
        hint.textContent = "Preview ready. Post or retake.";
      };
      recorder.start();
      recording = true;
      recordBtn.classList.add("recording");
      hint.textContent = "Recording… tap again to stop";
    }else{
      recorder.stop();
      recording = false;
      recordBtn.classList.remove("recording");
    }
  });

  resetBtn.addEventListener("click", () => {
    videoFile.value = "";
    openCamera();
  });

  flipBtn.addEventListener("click", () => {
    front = !front;
    openCamera();
  });

  openCamera();
})();
</script>
{% endblock %}
