{% extends "base.html" %}

{% block title %}Create Album | NamVibe{% endblock %}

{% block content %}
<section style="max-width: 760px; margin: 0 auto; padding: 20px 16px 80px;">
    <form method="POST" enctype="multipart/form-data" style="display:grid; gap:16px; padding:24px; border-radius:28px; background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);">
        <h1 style="margin:0;">Create music album</h1>
        <label><span>Title</span><input type="text" name="title" required></label>
        <label><span>Description</span><textarea name="description" rows="4"></textarea></label>
        <label><span>Genre</span><input type="text" name="genre"></label>
        <label><span>Album cover</span><input type="file" name="cover" id="cover_input"></label>
        <div id="cover_preview" style="width:120px; height:120px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; overflow:hidden;">
            <i class="fas fa-compact-disc" style="font-size:40px; color:rgba(255,255,255,0.2);"></i>
        </div>
        <label><span>Price in coins</span><input type="number" min="0" name="price_coins"></label>
        <button type="submit" class="primary">Submit album</button>
    </form>
</section>

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('cover_input');
    const preview = document.getElementById('cover_preview');
    if (input && preview) {
        input.addEventListener('change', function() {
            const file = this.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                }
                reader.readAsDataURL(file);
            }
        });
    }
});
</script>
{% endblock %}
{% endblock %}
