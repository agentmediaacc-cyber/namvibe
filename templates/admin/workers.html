{% extends "base.html" %}
{% block content %}
<main class="admin-system-shell">
  <section class="admin-system-hero">
    <h1>Workers</h1>
    <p>Worker heartbeats, current jobs, and online status.</p>
  </section>
  <section class="admin-system-panel">
    <table>
      <thead><tr><th>Name</th><th>Type</th><th>Status</th><th>Current job</th><th>Last seen</th></tr></thead>
      <tbody id="workers-body"></tbody>
    </table>
  </section>
</main>
<script>
fetch('/system/api/workers').then(r => r.json()).then(data => {
  document.getElementById('workers-body').innerHTML = (data.workers || []).map(w =>
    `<tr><td>${w.worker_name}</td><td>${w.worker_type}</td><td>${w.status}</td><td>${w.current_job_id || ''}</td><td>${w.last_seen_at || ''}</td></tr>`
  ).join('') || '<tr><td colspan="5">No worker heartbeats yet</td></tr>';
});
</script>
{% endblock %}
