{% extends "base.html" %}
{% block content %}
<main class="admin-system-shell">
  <section class="admin-system-hero">
    <h1>Backup Status</h1>
    <p>Backup configuration, restore-plan readiness, and backup events.</p>
  </section>
  <section class="admin-system-panel">
    <pre id="backup-json">Loading...</pre>
  </section>
</main>
<script>
fetch('/production/api/backups').then(r => r.json()).then(data => {
  document.getElementById('backup-json').textContent = JSON.stringify(data, null, 2);
});
</script>
{% endblock %}
