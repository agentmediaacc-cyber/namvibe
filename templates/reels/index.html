{% extends "base.html" %}
{% block content %}
<div class="container-fluid p-0 bg-dark" style="height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory;">
    {% if reels %}
        {% for reel in reels %}
            <div class="reel-container position-relative w-100 d-flex align-items-center justify-content-center" style="height: 100vh; scroll-snap-align: start;">
                <video class="w-100 h-100" style="object-fit: cover;" loop playsinline onclick="this.paused ? this.play() : this.pause()">
                    <source src="{{ reel.video_url }}" type="video/mp4">
                </video>
                
                <div class="reel-overlay position-absolute bottom-0 start-0 w-100 p-3 text-white" style="background: linear-gradient(transparent, rgba(0,0,0,0.8));">
                    <h5>@{{ reel.username }}</h5>
                    <p>{{ reel.caption }}</p>
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-link text-white p-0" onclick="likeReel('{{ reel.id }}')">
                            <i class="fas fa-heart"></i> <span id="likes-{{ reel.id }}">{{ reel.likes_count }}</span>
                        </button>
                        <button class="btn btn-link text-white p-0" onclick="shareReel('{{ reel.id }}')">
                            <i class="fas fa-share"></i> {{ reel.shares_count }}
                        </button>
                        <span class="small"><i class="fas fa-eye"></i> {{ reel.views_count }}</span>
                    </div>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="d-flex align-items-center justify-content-center h-100 text-white flex-column">
            <p>No reels yet. Upload the first reel.</p>
            <a href="{{ url_for('reels.upload') }}" class="btn btn-primary">Upload Reel</a>
        </div>
    {% endif %}
</div>

<div class="position-fixed top-0 end-0 p-3">
    <a href="{{ url_for('reels.upload') }}" class="btn btn-light rounded-circle shadow">
        <i class="fas fa-plus"></i>
    </a>
</div>

<script>
function likeReel(reelId) {
    fetch(`/reels/api/reels/${reelId}/like`, {method: 'POST'})
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            const el = document.getElementById(`likes-${reelId}`);
            el.innerText = parseInt(el.innerText) + 1;
        }
    });
}

function shareReel(reelId) {
    fetch(`/reels/api/reels/${reelId}/share`, {method: 'POST'})
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert('Link copied to clipboard!');
        }
    });
}
</script>
{% endblock %}
