<style>
  .dating-shell{max-width:1180px;margin:0 auto;padding:24px 16px 96px;color:#f8fafc}
  .dating-hero,.dating-panel,.dating-card{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.075);border-radius:22px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.25)}
  .dating-hero{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(280px,.9fr);gap:18px;align-items:center;background:linear-gradient(135deg,rgba(244,63,94,.18),rgba(20,184,166,.12))}
  .dating-hero h1{font-size:clamp(34px,5vw,58px);line-height:1.02;margin:0 0 12px}.dating-muted{color:#cbd5e1;line-height:1.7}
  .dating-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.1);color:#fbcfe8;font-size:13px;font-weight:800}
  .dating-actions,.dating-tabs{display:flex;gap:10px;flex-wrap:wrap}.dating-actions a,.dating-actions button,.dating-tabs a{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:white;border-radius:8px;padding:11px 14px;font-weight:900}.dating-primary{background:linear-gradient(135deg,#14b8a6,#f43f5e)!important}
  .dating-layout{display:grid;grid-template-columns:260px minmax(0,1fr) 260px;gap:16px;margin-top:18px}.dating-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.dating-photo{height:300px;border-radius:18px;background:linear-gradient(135deg,rgba(20,184,166,.32),rgba(244,63,94,.28));overflow:hidden;display:grid;place-items:center}.dating-photo img{width:100%;height:100%;object-fit:cover}.chip-row{display:flex;gap:8px;flex-wrap:wrap}.chip{background:rgba(56,189,248,.13);color:#bfdbfe;border-radius:999px;padding:6px 9px;font-size:13px}.filter-form{display:grid;gap:10px}.filter-form input,.filter-form select,.dating-form input,.dating-form textarea,.dating-form select{width:100%;min-width:0;border:1px solid rgba(255,255,255,.12);background:#081322;color:white;border-radius:8px;padding:11px}.dating-form{display:grid;gap:14px}.match-row{display:flex;gap:12px;align-items:center;justify-content:space-between;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.055);border-radius:14px;padding:12px;margin-bottom:10px}.avatar{width:54px;height:54px;border-radius:999px;background:linear-gradient(135deg,#14b8a6,#f43f5e);display:grid;place-items:center;font-weight:900}
  .dating-empty{display:grid;gap:10px;padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.04)}
  .dating-empty strong{font-size:1rem}
  @media(max-width:920px){.dating-hero,.dating-layout{grid-template-columns:1fr}.dating-layout aside{order:2}.dating-photo{height:360px}}
</style>
