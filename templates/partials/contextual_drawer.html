<div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>

<nav class="menu-drawer panel" id="menuDrawer" aria-hidden="true" aria-label="{{ drawer_label|default:'Main menu' }}">
  <div class="drawer-head">
    <div class="drawer-title">{{ drawer_title|default:"Menu" }}</div>
    <button class="drawer-close" type="button" aria-label="Close menu">×</button>
  </div>

  <div class="drawer-menu-list">
    {% if nav_context == "dashboard" %}
      <button class="menu-item active js-drawer-action" type="button" data-dashboard-section="overview">
        <span class="menu-left"><span class="menu-icon">🏠</span><span>Dashboard</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="profile">
        <span class="menu-left"><span class="menu-icon">👤</span><span>Profile</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="posts">
        <span class="menu-left"><span class="menu-icon">📝</span><span>Posts</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="reels">
        <span class="menu-left"><span class="menu-icon">🎬</span><span>Reels</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="messages">
        <span class="menu-left"><span class="menu-icon">💬</span><span>Messages</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="friends">
        <span class="menu-left"><span class="menu-icon">👥</span><span>Friends</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="wallet">
        <span class="menu-left"><span class="menu-icon">🪙</span><span>Wallet</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="live">
        <span class="menu-left"><span class="menu-icon">📡</span><span>Live</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="support">
        <span class="menu-left"><span class="menu-icon">🛟</span><span>Support</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-dashboard-section="settings">
        <span class="menu-left"><span class="menu-icon">⚙️</span><span>Settings</span></span>
      </button>
    {% else %}
      <button class="menu-item active js-drawer-action" type="button" data-section="home">
        <span class="menu-left"><span class="menu-icon">🏠</span><span>Home</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-section="gallery">
        <span class="menu-left"><span class="menu-icon">🖼</span><span>Gallery Hub</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-section="followers">
        <span class="menu-left"><span class="menu-icon">👥</span><span>My Followers</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-section="wallets">
        <span class="menu-left"><span class="menu-icon">💼</span><span>Wallets</span></span>
      </button>
      <button class="menu-item js-drawer-action" type="button" data-section="security">
        <span class="menu-left"><span class="menu-icon">🔐</span><span>Security</span></span>
      </button>
      <a class="menu-item js-drawer-action" href="{{ smart_profile_url }}">
        <span class="menu-left"><span class="menu-icon">🙍</span><span>My Profile</span></span>
      </a>
      <button class="menu-item js-drawer-action" type="button" data-section="anonymous">
        <span class="menu-left"><span class="menu-icon">🕶</span><span>Anonymous Mode</span></span>
      </button>
    {% endif %}
  </div>
</nav>
