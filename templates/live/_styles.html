<style>
  .live-shell{max-width:1180px;margin:0 auto;padding:18px 12px 96px;color:#1f1a14}

    padding:16px;
    box-shadow:0 24px 60px rgba(66,45,10,.06)
  }
  .live-hero{
    display:grid;
    grid-template-columns:minmax(0,1.15fr) minmax(280px,.85fr);

    color:#2b2216;
    border-radius:14px;

    place-items:center;
    border:1px solid rgba(120,92,39,.14);
