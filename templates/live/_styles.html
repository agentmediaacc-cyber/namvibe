<style>
  .live-shell{max-width:1180px;margin:0 auto;padding:24px 16px 96px;color:#1f1a14}.live-panel,.live-card,.live-hero{border:1px solid rgba(120,92,39,.14);background:rgba(255,253,249,.96);border-radius:22px;padding:18px;box-shadow:0 24px 60px rgba(66,45,10,.06)}.live-hero{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(280px,.85fr);gap:18px;background:linear-gradient(135deg,rgba(247,237,214,.95),rgba(255,250,241,.88))}.live-hero h1{font-size:clamp(34px,5vw,58px);line-height:1.02;margin:0 0 12px}.muted{color:#7a6d5b;line-height:1.7}.live-actions,.live-tabs{display:flex;gap:10px;flex-wrap:wrap}.live-actions a,.live-actions button,.live-tabs a{border:1px solid rgba(120,92,39,.14);background:#fff;color:#2b2216;border-radius:14px;padding:11px 14px;font-weight:900}.primary{background:linear-gradient(135deg,#c7a14a,#9c7427)!important;color:#fffdf7!important;border-color:transparent!important}.live-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:16px}.thumb{height:210px;border-radius:18px;background:linear-gradient(135deg,rgba(199,161,74,.22),rgba(227,212,179,.18));overflow:hidden;display:grid;place-items:center}.thumb img{width:100%;height:100%;object-fit:cover}.badge{display:inline-flex;width:max-content;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:900}.badge-live{background:#fee2e2;color:#b42318}.badge-scheduled{background:#eef2ff;color:#4338ca}.room-layout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px}.player{min-height:460px;border-radius:24px;background:radial-gradient(circle at center,rgba(199,161,74,.18),transparent 30%),#1f1a14;display:grid;place-items:center;border:1px solid rgba(120,92,39,.14);overflow:hidden}.player video{width:100%;height:100%;object-fit:cover}.chat-list{display:grid;gap:8px;max-height:420px;overflow:auto}.chat-item{border:1px solid rgba(120,92,39,.08);background:rgba(255,250,243,.88);border-radius:12px;padding:10px}.chat-form textarea,.live-form input,.
