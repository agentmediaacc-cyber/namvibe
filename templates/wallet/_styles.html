<style>
  .wallet-shell{max-width:1120px;margin:0 auto;padding:28px 16px 92px;color:#f5efe2}
  .wallet-hero,.wallet-card{border:1px solid rgba(212,177,106,.18);background:linear-gradient(145deg,rgba(14,17,24,.96),rgba(20,24,34,.92));border-radius:28px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.32);backdrop-filter:blur(16px)}
  .wallet-hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:center;margin-bottom:16px}
  .wallet-hero-premium{background:radial-gradient(circle at top left, rgba(212,177,106,.16), transparent 28%), linear-gradient(145deg,rgba(14,17,24,.98),rgba(34,24,17,.94))}
  .wallet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:16px 0}
  .wallet-layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:16px;align-items:start}
  .wallet-card{margin-bottom:16px}
  .wallet-card h1,.wallet-card h2,.wallet-hero h1{margin:0 0 8px}
  .muted{color:#a9a191;line-height:1.6}
  .money{font-size:1.7rem;font-weight:900}
  .pill,.wallet-card button,.wallet-hero a{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(212,177,106,.18);border-radius:14px;padding:10px 13px;background:rgba(22,26,36,.92);color:#f5efe2;text-decoration:none;font-weight:800}
  .primary,.wallet-card button{background:linear-gradient(135deg,#d4b16a,#f1d8a3);border-color:transparent;color:#120f09}
  .table-list{display:grid;gap:10px}
  .row{display:grid;grid-template-columns:1fr auto;gap:12px;border:1px solid rgba(212,177,106,.12);border-radius:18px;padding:12px;background:rgba(10,12,18,.82)}
  .status{font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:#d4b16a}
  .plan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .wallet-highlight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:16px}
  .wallet-highlight{padding:14px;border-radius:20px;background:rgba(8,10,16,.84);border:1px solid rgba(212,177,106,.12)}
  .wallet-highlight span{display:block;color:#a9a191;font-size:12px;margin-bottom:6px}
  input,select{width:100%;border:1px solid rgba(212,177,106,.18);border-radius:14px;background:rgba(9,11,17,.96);color:#f5efe2;padding:11px}
  @media(max-width:820px){.wallet-hero,.wallet-layout{grid-template-columns:1fr}.wallet-shell{padding-inline:12px}.row{grid-template-columns:1fr}}
</style>
