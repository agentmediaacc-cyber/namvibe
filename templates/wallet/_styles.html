<style>
  .wallet-shell{max-width:1120px;margin:0 auto;padding:28px 16px 92px;color:#1f1a14}
  .wallet-hero,.wallet-card{border:1px solid rgba(120,92,39,.14);background:linear-gradient(135deg,rgba(255,253,249,.98),rgba(249,244,235,.94));border-radius:22px;padding:22px;box-shadow:0 20px 50px rgba(66,45,10,.06);backdrop-filter:blur(16px)}
  .wallet-hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:center;margin-bottom:16px}
  .wallet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:16px 0}
  .wallet-layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:16px;align-items:start}
  .wallet-card{margin-bottom:16px}
  .wallet-card h1,.wallet-card h2,.wallet-hero h1{margin:0 0 8px}
  .muted{color:#7a6d5b;line-height:1.6}
  .money{font-size:1.7rem;font-weight:900}
  .pill,.wallet-card button,.wallet-hero a{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(120,92,39,.14);border-radius:14px;padding:10px 13px;background:#fff;color:#2b2216;text-decoration:none;font-weight:800}
  .primary,.wallet-card button{background:linear-gradient(135deg,#c7a14a,#9c7427);border-color:transparent;color:#fffdf7}
  .table-list{display:grid;gap:10px}
  .row{display:grid;grid-template-columns:1fr auto;gap:12px;border:1px solid rgba(120,92,39,.10);border-radius:18px;padding:12px;background:rgba(255,255,255,.78)}
  .status{font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:#0f766e}
  .plan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  input,select{width:100%;border:1px solid rgba(120,92,39,.14);border-radius:14px;background:#fffdf9;color:#1f1a14;padding:11px}
  @media(max-width:820px){.wallet-hero,.wallet-layout{grid-template-columns:1fr}.wallet-shell{padding-inline:12px}.row{grid-template-columns:1fr}}
</style>
