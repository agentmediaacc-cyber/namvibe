{% extends "base.html" %}
{% block content %}
<main class="admin-system-shell">
  <section class="admin-system-hero">
    <h1>System Health</h1>
    <p>Production readiness, queue, Redis, worker, storage, and notification status.</p>
  </section>
  <section class="admin-system-grid">
    <article class="admin-system-panel">
      <h2>Health</h2>
      <pre id="system-health-json">Loading...</pre>
    </article>
    <article class="admin-system-panel">
      <h2>Redis Health</h2>
      <div id="redis-health-card">Checking fallback status...</div>
    </article>
  </section>
</main>
<script>
fetch('/system/api/health').then(r => r.json()).then(data => {
  document.getElementById('system-health-json').textContent = JSON.stringify(data, null, 2);
  const redis = data.components && data.components.redis || {};
  document.getElementById('redis-health-card').textContent = `${redis.status || 'unknown'} (${redis.backend || 'fallback'})`;
});
</script>
{% endblock %}
